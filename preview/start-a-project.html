    /* Desktop: floating card */

      width: 100%;
      max-width: 780px;
      background: rgba(255, 255, 255, 0.97);
      border-radius: 12px;
      box-shadow: 0 8px 60px rgba(0, 0, 0, 0.4);
      overflow: hidden;
      flex: none;
      transition: height 0.3s ease;
    }

  <script>
    // Mobile nav toggle
    var navToggle = document.getElementById('navToggle');
    var navLinks = document.getElementById('navLinks');
    if (navToggle && navLinks) {
      navToggle.addEventListener('click', function() {
        navLinks.classList.toggle('nav__links--open');
      });
    }

    // Auto-resize iframe via postMessage from Elevate Scheduling
    //
    // Elevate sends {type:'elevate-resize', height:N} on every ResizeObserver
    // callback. Because min-h-screen on #root>div stretches to fill the iframe,
    // scrollHeight grows whenever we make the iframe taller — feedback loop.
    //
    // Fix: after accepting a height, lock for 500ms. During lock, track only
    // heights SMALLER than what we set (those indicate a real step change to
    // shorter content). Ignore heights >= current (those are the echo).
    (function() {
      var frame = document.querySelector('.sap-frame iframe');
      var wrapper = document.querySelector('.sap-frame');
      if (!frame || !wrapper) return;

      var PADDING = 40;
      var MIN_H   = 500;
      var currentH = 0;
      var locked   = false;
      var timer    = null;
      var shrinkTo = null; // tracks if content shrank during lock

      function setSize(h) {
        currentH = h;
        frame.style.height   = h + 'px';
        wrapper.style.height = h + 'px';
      }

      function accept(rawH) {
        var target = Math.max(rawH + PADDING, MIN_H);
        setSize(target);
        locked = true;
        shrinkTo = null;
        clearTimeout(timer);
        timer = setTimeout(function() {
          locked = false;
          // If content shrank during lock (step change to shorter content), apply it
          if (shrinkTo !== null) {
            accept(shrinkTo);
          }
        }, 500);
      }

      window.addEventListener('message', function(e) {
        if (!e.data || e.data.type !== 'elevate-resize') return;
        var h = e.data.height;
        if (typeof h !== 'number' || h < 50) return;

        if (!locked) {
          accept(h);
          return;
        }

        // During lock: only track if this height is SMALLER than current
        // (means content genuinely shrank — e.g. went from Step 2 back to Step 1)
        var target = Math.max(h + PADDING, MIN_H);
        if (target < currentH - 10) {
          // Content is shorter — record it for when lock expires
          if (shrinkTo === null || h < shrinkTo) shrinkTo = h;
        }
        // Heights >= current are the feedback echo — ignore them
      });
    })();
  </script>
</body>
