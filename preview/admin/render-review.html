#note-bar{padding:7px 24px;font-size:11px;color:#d97706;background:#1c1400;border-bottom:1px solid #2a1a00;flex-shrink:0;display:none}

#viewer{flex:1;display:flex;min-height:0}
.panel{flex:1;display:flex;flex-direction:column;min-width:0}
#orig-panel{border-right:1px solid #1e3040}

.render-label{color:#3b82f6}

.panel-img-wrap img{max-width:100%;max-height:100%;object-fit:contain;transition:opacity .2s}
#render-spinner{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:40px;height:40px;border:3px solid #1e3040;border-top-color:#3b82f6;border-radius:50%;animation:spin .65s linear infinite;display:none}
@keyframes spin{to{transform:rotate(360deg)}}
/* Prompt row */
#prompt-section{padding:12px 20px;border-top:1px solid #1e3040;display:flex;align-items:flex-end;gap:10px;flex-shrink:0;background:#0d1a22}
#prompt-label{font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:#6b8fa6;white-space:nowrap;padding-bottom:11px}
#prompt-textarea{flex:1;background:#091520;color:#e8eef2;border:1px solid #2a4050;border-radius:8px;padding:10px 13px;font-size:13px;font-family:inherit;line-height:1.5;outline:none;resize:vertical;min-height:56px;max-height:130px}
#prompt-textarea:focus{border-color:#3b82f6}
#prompt-right{flex:1;display:flex;flex-direction:column;gap:8px}
#prompt-actions{display:flex;align-items:center;gap:10px}
#source-toggle{display:flex;border-radius:6px;overflow:hidden;border:1px solid #2a4050;flex-shrink:0}
.src-btn{background:#0a1520;color:#6b8fa6;border:none;padding:7px 14px;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;white-space:nowrap}
.src-btn.active{background:#1d4ed8;color:#fff}
.src-btn:hover:not(.active):not(:disabled){background:#152030;color:#94a3b8}
.src-btn:disabled{opacity:.45;cursor:not-allowed}
#btn-rerender{background:#1e3040;color:#60a5fa;border:1px solid #1d4ed8;padding:10px 18px;border-radius:8px;cursor:pointer;font-size:14px;font-weight:700;white-space:nowrap;transition:all .15s;flex-shrink:0}
#btn-rerender:hover:not(:disabled){background:#1a3d6e;color:#93c5fd}
#btn-rerender:disabled{opacity:.45;cursor:not-allowed}
/* Footer */
#footer{padding:13px 20px;border-top:1px solid #1e3040;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.btn{padding:11px 28px;border-radius:8px;border:none;cursor:pointer;font-size:15px;font-weight:700;letter-spacing:.02em;transition:all .15s;white-space:nowrap}
.btn:disabled{opacity:.45;cursor:not-allowed}
#btn-skip{background:#1e3040;color:#94a3b8}
#btn-skip:hover:not(:disabled){background:#243848;color:#e8eef2}
#btn-set{background:#166534;color:#bbf7d0;padding:11px 42px;font-size:16px}

#status-badge{padding:7px 14px;border-radius:6px;font-size:13px;font-weight:700;display:none}

#status-badge.err{background:#2d0707;color:#f87171;border:1px solid #7f1d1d;display:inline-block}

#done-screen h2{font-size:32px;font-weight:800;color:#22c55e}

const btnRerender   = document.getElementById('btn-rerender');
const btnSrcOrig    = document.getElementById('btn-src-orig');
const btnSrcRender  = document.getElementById('btn-src-render');

const btnSkip       = document.getElementById('btn-skip');

const footer        = document.getElementById('footer');
const header        = document.getElementById('header');
const doneScreen    = document.getElementById('done-screen');
const doneSummary   = document.getElementById('done-summary');

function renderCard(i) {
  if (i >= total) { showDone(); return; }
  const c = CARDS[i];
  idx = i;

  progressFill.style.width = ((i / total) * 100) + '%';
  counter.textContent = `${i + 1} / ${total}`;
  cardLabel.textContent = c.label;
  pageLink.href = c.pageUrl;

  // Note bar
  if (c.note) {
    noteBar.textContent = '⚠ ' + c.note;
    noteBar.style.display = 'block';
  } else {
    noteBar.style.display = 'none';
  }

  // Images — use _1920w for quality display
  origImg.src   = `/assets/images-opt/${c.baseFile.replace('.webp', '_1920w.webp')}`;
  renderImg.src = `/assets/images-opt/${c.renderFile.replace('.webp', '_1920w.webp')}`;
  renderImg.style.opacity = '1';
  renderSpinner.style.display = 'none';

  // Prompt
  promptTA.value = c.prompt;

  // Status
  statusBadge.className = '';
  statusBadge.textContent = '';
  statusBadge.style.display = 'none';

  setButtons(true);
}

function setButtons(enabled) {
  btnSkip.disabled     = !enabled;
  btnSet.disabled      = !enabled;
  btnRerender.disabled = !enabled;
  btnSrcOrig.disabled  = !enabled;
  btnSrcRender.disabled = !enabled;
  if (enabled) {
    renderSpinner.style.display = 'none';
    renderImg.style.opacity = '1';
  }
}

function showStatus(ok, msg) {
  statusBadge.className = ok ? 'ok' : 'err';
  statusBadge.textContent = msg;
  if (ok) setTimeout(() => { statusBadge.className = ''; statusBadge.textContent = ''; statusBadge.style.display = 'none'; }, 2500);
}

// ── API helpers ───────────────────────────────────────────────────────────────
async function apiPut(slug, cardId, imageFile, pos, zoom) {
  const r = await fetch(`/admin/api/cards/${encodeURIComponent(slug)}/${encodeURIComponent(cardId)}`, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json', 'X-Admin-Token': TOKEN },
    body: JSON.stringify({ mode: 'image', image: `/assets/images-opt/${imageFile}`, position: pos, zoom })
  });
  if (!r.ok) { const j = await r.json().catch(() => ({})); throw new Error(j.error || r.status); }
  return r.json();
}

async function apiSetVersion(baseFile, versionFile) {
  const r = await fetch('/admin/api/images/set-version', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'X-Admin-Token': TOKEN },
    body: JSON.stringify({ base_filename: baseFile, version_filename: versionFile })
  });
  if (!r.ok) { const j = await r.json().catch(() => ({})); throw new Error(j.error || r.status); }
  return r.json();
}

async function apiPublish(slugs) {
  if (!slugs || !slugs.length) return;
  const r = await fetch('/admin/api/pages/publish', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'X-Admin-Token': TOKEN },
    body: JSON.stringify({ slugs })
  });
  if (!r.ok) { const j = await r.json().catch(() => ({})); throw new Error('publish: ' + (j.error || r.status)); }
  return r.json();
}

async function apiRerender(sourceFile, baseFile, prompt) {
  // sourceFile = what Gemini receives as input (base or current render)
  // baseFile   = used to generate the output filename (_ai_N.webp family)
  const r = await fetch('/admin/api/images/rerender', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'X-Admin-Token': TOKEN },
    body: JSON.stringify({ filename: sourceFile, base_filename: baseFile, prompt, mode: 'new' })
  });
  if (!r.ok) { const j = await r.json().catch(() => ({})); throw new Error(j.error || r.status); }
  return r.json();
}

// ── Set action ────────────────────────────────────────────────────────────────
async function doSet() {
  const c = CARDS[idx];
  setButtons(false);
  statusBadge.style.display = 'none';
  try {
    for (const a of c.actions) {
      if (a.type === 'card') {
        await apiPut(a.slug, a.cardId, c.renderFile, a.pos, a.zoom);
      } else if (a.type === 'version') {
        await apiSetVersion(c.baseFile, c.renderFile);
      }
    }
    if (c.publish && c.publish.length) {
      await apiPublish(c.publish);
    }
    setCount++;
    showStatus(true, '✓ Set & published!');
    setTimeout(() => { renderCard(idx + 1); }, 900);
  } catch (e) {
    showStatus(false, '✗ Error: ' + e.message);
    setButtons(true);
  }
}

// ── Re-render action ──────────────────────────────────────────────────────────
async function doRerender() {
  const c = CARDS[idx];
  const newPrompt = promptTA.value.trim();
  if (!newPrompt) return;
  setButtons(false);
  renderImg.style.opacity = '0.15';
  renderSpinner.style.display = 'block';
  statusBadge.className = '';
  statusBadge.textContent = '';
  statusBadge.style.display = 'none';
  try {
    const sourceFile = sourceMode === 'render' ? c.renderFile : c.baseFile;
    const result = await apiRerender(sourceFile, c.baseFile, newPrompt);
    if (!result.ok || !result.filename) throw new Error(result.error || 'No filename returned');
    c.renderFile = result.filename;
    c.prompt     = newPrompt;
    const newUrl = `/assets/images-opt/${result.filename.replace('.webp', '_1920w.webp')}?t=${Date.now()}`;
    renderImg.onload = () => { renderImg.style.opacity = '1'; renderSpinner.style.display = 'none'; };
    renderImg.src = newUrl;
    showStatus(true, '✓ New render ready');
    setButtons(true);
  } catch (e) {
    renderImg.style.opacity = '1';
    renderSpinner.style.display = 'none';
    showStatus(false, '✗ Re-render failed: ' + e.message);
    setButtons(true);
  }
}

// ── Event listeners ───────────────────────────────────────────────────────────
btnSet.addEventListener('click', doSet);
btnRerender.addEventListener('click', doRerender);

btnSrcOrig.addEventListener('click', () => {
  sourceMode = 'base';
  btnSrcOrig.classList.add('active');
  btnSrcRender.classList.remove('active');
});
btnSrcRender.addEventListener('click', () => {
  sourceMode = 'render';
  btnSrcRender.classList.add('active');
  btnSrcOrig.classList.remove('active');
});

btnSkip.addEventListener('click', () => {
  skipCount++;
  renderCard(idx + 1);
});

// ── Done screen ───────────────────────────────────────────────────────────────
function showDone() {
  progressFill.style.width = '100%';
  header.style.display        = 'none';
  noteBar.style.display       = 'none';
  viewer.style.display        = 'none';
  promptSection.style.display = 'none';
  footer.style.display        = 'none';
  doneScreen.style.display    = 'flex';
  doneSummary.textContent = `${setCount} render${setCount !== 1 ? 's' : ''} activated · ${skipCount} skipped`;
}

// ── Keyboard shortcuts ────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.target === promptTA) return; // don't hijack textarea input
  if (e.key === 'Enter' || e.key === 'y') btnSet.click();
  if (e.key === 'ArrowRight' || e.key === 'n') btnSkip.click();
});

// ── Start ─────────────────────────────────────────────────────────────────────
renderCard(0);
</script>
</body>
