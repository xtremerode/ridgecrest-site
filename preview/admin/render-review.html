<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Render Review — Ridgecrest</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:#0d1a22;color:#e8eef2;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;display:flex;flex-direction:column;overflow:hidden}
#progress-bar{height:4px;background:#1e3040;position:fixed;top:0;left:0;right:0;z-index:100}
#progress-fill{height:100%;background:#3b82f6;transition:width .4s ease}

/* Loading */
#loading-screen{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;color:#6b8fa6}
#loading-screen .spinner{width:36px;height:36px;border:3px solid #1e3040;border-top-color:#3b82f6;border-radius:50%;animation:spin .65s linear infinite}
#loading-screen p{font-size:14px}

/* Header */
#header{padding:14px 20px 10px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #1e3040;flex-shrink:0;display:none}
#counter{font-size:12px;color:#6b8fa6;font-weight:700;letter-spacing:.06em;text-transform:uppercase;white-space:nowrap}
#card-label{font-size:18px;font-weight:700;color:#e8eef2;flex:1;text-align:center;padding:0 16px}
#page-link{font-size:12px;color:#3b82f6;text-decoration:none;white-space:nowrap}
#page-link:hover{color:#60a5fa}

/* Status bar */
#status-bar{padding:5px 20px;border-bottom:1px solid #1e3040;flex-shrink:0;display:none;align-items:center;gap:10px;min-height:30px}
.card-badge{font-size:11px;font-weight:700;letter-spacing:.06em;padding:3px 9px;border-radius:4px}
.badge-active{background:#0c2b42;color:#38bdf8;border:1px solid #0e4c6e}
.badge-approved{background:#052e16;color:#22c55e;border:1px solid #166534}
.badge-missing{background:#2a1800;color:#f59e0b;border:1px solid #78350f}
.badge-rerender{background:#2d0707;color:#f87171;border:1px solid #7f1d1d}
.badge-restored{background:#0a2a1a;color:#34d399;border:1px solid #065f46}
#btn-filter{background:#1e3040;color:#f59e0b;border:1px solid #78350f;font-size:12px;padding:7px 14px}
#btn-filter.filter-on{background:#f59e0b;color:#1a0800;border-color:#d97706}
#btn-filter:hover:not(:disabled){background:#2a1800;color:#fbbf24;border-color:#92400e}
#note-text{font-size:11px;color:#d97706}

/* Two-panel viewer */
#viewer{flex:1;display:flex;min-height:0;display:none}
.panel{flex:1;display:flex;flex-direction:column;min-width:0}
#orig-panel{border-right:1px solid #1e3040}
.panel-label{padding:4px 10px;font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#6b8fa6;background:#091520;border-bottom:1px solid #1e3040;flex-shrink:0;display:flex;align-items:center;justify-content:center;gap:8px}
.render-label{color:#3b82f6}
.rotate-btns{display:flex;gap:3px;margin-left:6px}
.rot-btn{background:#152030;color:#6b8fa6;border:1px solid #2a4050;border-radius:5px;padding:2px 7px;font-size:14px;line-height:1.4;cursor:pointer;transition:all .15s}
.rot-btn:hover:not(:disabled){background:#243848;color:#e8eef2;border-color:#3b82f6}
.rot-btn:disabled{opacity:.35;cursor:not-allowed}
.panel-img-wrap{flex:1;display:flex;align-items:center;justify-content:center;overflow:hidden;background:#091520;position:relative}
.panel-img-wrap img{max-width:100%;max-height:100%;object-fit:contain;transition:opacity .2s}
#render-spinner{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:40px;height:40px;border:3px solid #1e3040;border-top-color:#3b82f6;border-radius:50%;animation:spin .65s linear infinite;display:none}
#render-missing-msg{position:absolute;top:0;left:0;right:0;bottom:0;display:none;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:#f59e0b;background:#091520}
#render-missing-msg .icon{font-size:36px;opacity:.6}
#render-missing-msg p{font-size:13px;color:#6b8fa6;text-align:center;line-height:1.5;max-width:200px}
@keyframes spin{to{transform:rotate(360deg)}}

/* Prompt section */
#prompt-section{padding:11px 20px;border-top:1px solid #1e3040;display:none;align-items:flex-end;gap:10px;flex-shrink:0;background:#0d1a22}
#prompt-label{font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:#6b8fa6;white-space:nowrap;padding-bottom:32px}
#prompt-right{flex:1;display:flex;flex-direction:column;gap:7px}
#prompt-textarea{background:#091520;color:#e8eef2;border:1px solid #2a4050;border-radius:8px;padding:9px 12px;font-size:13px;font-family:inherit;line-height:1.5;outline:none;resize:vertical;min-height:52px;max-height:120px;width:100%}
#prompt-textarea:focus{border-color:#3b82f6}
#prompt-actions{display:flex;align-items:center;gap:10px}
#source-toggle{display:flex;border-radius:6px;overflow:hidden;border:1px solid #2a4050;flex-shrink:0}
.src-btn{background:#0a1520;color:#6b8fa6;border:none;padding:6px 13px;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;white-space:nowrap}
.src-btn.active{background:#1d4ed8;color:#fff}
.src-btn:hover:not(.active):not(:disabled){background:#152030;color:#94a3b8}
.src-btn:disabled{opacity:.45;cursor:not-allowed}
#btn-rerender{background:#1e3040;color:#60a5fa;border:1px solid #1d4ed8;padding:9px 16px;border-radius:8px;cursor:pointer;font-size:14px;font-weight:700;white-space:nowrap;transition:all .15s;flex-shrink:0}
#btn-rerender:hover:not(:disabled){background:#1a3d6e;color:#93c5fd}
#btn-rerender:disabled{opacity:.45;cursor:not-allowed}
#surgical-link{font-size:12px;color:#6b8fa6;text-decoration:none;white-space:nowrap;margin-left:auto;padding:6px 0}
#surgical-link:hover{color:#94a3b8}

/* Footer */
#footer{padding:12px 20px;border-top:1px solid #1e3040;display:none;align-items:center;justify-content:space-between;flex-shrink:0}
.btn{padding:10px 24px;border-radius:8px;border:none;cursor:pointer;font-size:14px;font-weight:700;letter-spacing:.02em;transition:all .15s;white-space:nowrap}
.btn:disabled{opacity:.45;cursor:not-allowed}
#footer-left{display:flex;align-items:center;gap:8px}
#btn-back{background:#1e3040;color:#6b8fa6;border:1px solid #1e3040}
#btn-back:hover:not(:disabled){background:#243848;color:#94a3b8;border-color:#2a4050}
#btn-skip{background:#1e3040;color:#94a3b8}
#btn-skip:hover:not(:disabled){background:#243848;color:#e8eef2}
#btn-set{background:#166534;color:#bbf7d0;padding:10px 38px;font-size:15px}
#btn-set:hover:not(:disabled){background:#15803d;color:#dcfce7}
#action-status{padding:6px 12px;border-radius:6px;font-size:12px;font-weight:700;display:none}
#action-status.ok{background:#052e16;color:#22c55e;border:1px solid #166534;display:inline-block}
#action-status.err{background:#2d0707;color:#f87171;border:1px solid #7f1d1d;display:inline-block}

/* Model toggle */
#model-toggle{display:flex;border-radius:6px;overflow:hidden;border:1px solid #2a4050;flex-shrink:0}
.model-btn{background:#0a1520;color:#6b8fa6;border:none;padding:6px 11px;font-size:11px;font-weight:700;cursor:pointer;transition:all .15s;white-space:nowrap;letter-spacing:.03em}
.model-btn.active{background:#7c3aed;color:#ede9fe}
.model-btn:hover:not(.active):not(:disabled){background:#152030;color:#94a3b8}
.model-btn:disabled{opacity:.45;cursor:not-allowed}
.model-badge{display:inline-block;font-size:9px;font-weight:800;padding:1px 4px;border-radius:3px;margin-left:4px;vertical-align:middle;letter-spacing:.04em}
.model-badge-gemini{background:#1d4ed8;color:#bfdbfe}
.model-badge-openai{background:#7c3aed;color:#ede9fe}

/* Reference image row */
#ref-row{display:flex;align-items:center;gap:10px;padding-top:4px}
#ref-row-label{font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:#6b8fa6;white-space:nowrap;flex-shrink:0}
#ref-zone{flex:1;min-width:0}
#ref-empty-label{display:flex;align-items:center;gap:6px;padding:6px 10px;border:1.5px dashed #2a4050;border-radius:7px;cursor:pointer;color:#6b8fa6;font-size:12px;transition:border-color .15s,color .15s;white-space:nowrap}
#ref-empty-label:hover{border-color:#3b82f6;color:#60a5fa}
#ref-empty-label.drag-over{border-color:#3b82f6;background:#091e2e;color:#60a5fa}
#ref-empty-label span{pointer-events:none}
#ref-loaded{display:none;align-items:center;gap:8px;padding:4px 8px;border:1px solid #2a4050;border-radius:7px;background:#091520}
#ref-loaded img{width:48px;height:36px;object-fit:cover;border-radius:4px;flex-shrink:0}
#ref-loaded-name{font-size:12px;color:#94a3b8;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
#ref-clear-btn{background:none;border:none;color:#6b8fa6;cursor:pointer;font-size:14px;padding:2px 4px;flex-shrink:0;line-height:1}
#ref-clear-btn:hover{color:#f87171}

/* Filmstrip */
#filmstrip{height:84px;overflow-x:auto;overflow-y:hidden;display:flex;gap:6px;padding:6px 10px;background:#061018;border-top:1px solid #1e3040;flex-shrink:0;align-items:center;min-width:0;scrollbar-width:thin;scrollbar-color:#1e3040 #061018}
#filmstrip:empty{display:none}
.fs-thumb{flex-shrink:0;width:76px;height:64px;border-radius:5px;border:2px solid #1e3040;cursor:pointer;overflow:hidden;position:relative;background:#091520;transition:border-color .15s}
.fs-thumb img{width:100%;height:100%;object-fit:contain;display:block;background:#091520}
.fs-thumb.fs-selected{border-color:#3b82f6;box-shadow:0 0 0 1px #3b82f6}
.fs-thumb:hover:not(.fs-selected){border-color:#2a4050}
.fs-label{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.7);color:#94a3b8;font-size:10px;font-weight:700;text-align:center;padding:2px 0;pointer-events:none;letter-spacing:.04em}
.fs-live-badge{position:absolute;top:2px;right:2px;background:#0ea5e9;color:#fff;font-size:9px;font-weight:800;padding:1px 4px;border-radius:3px;letter-spacing:.04em;pointer-events:none;line-height:1.3}
.fs-del-btn{position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:50%;background:rgba(20,5,5,.9);border:1px solid #7f1d1d;color:#f87171;font-size:10px;font-weight:800;cursor:pointer;display:none;align-items:center;justify-content:center;line-height:1;z-index:10;padding:0;transition:background .1s}
.fs-thumb:hover .fs-del-btn{display:flex}
.fs-del-btn:hover:not(:disabled){background:#7f1d1d;color:#fff}
.fs-thumb.fs-pending{cursor:default;border-color:#1e3040}
.fs-pending .fs-spin{width:28px;height:28px;border:2px solid #1e3040;border-top-color:#3b82f6;border-radius:50%;animation:spin .65s linear infinite;margin:auto;margin-top:15px}
.fs-pending-model{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.7);color:#6b8fa6;font-size:10px;font-weight:700;text-align:center;padding:2px 0;letter-spacing:.04em}

/* Done screen */
#done-screen{display:none;flex:1;flex-direction:column;align-items:center;justify-content:center;gap:16px}
#done-screen h2{font-size:32px;font-weight:800;color:#22c55e}
#done-screen p{color:#6b8fa6;font-size:16px}
</style>
</head>
<body>

<div id="progress-bar"><div id="progress-fill"></div></div>

<div id="loading-screen">
  <div class="spinner"></div>
  <p>Loading render queue…</p>
</div>

<div id="header">
  <span id="counter"></span>
  <span id="card-label"></span>
  <a id="page-link" href="#" target="_blank">View live page ↗</a>
</div>
<div id="status-bar">
  <span id="card-badge"></span>
  <span id="note-text"></span>
</div>

<div id="viewer">
  <div class="panel" id="orig-panel">
    <div class="panel-label">
      Original
      <div class="rotate-btns">
        <button class="rot-btn" id="btn-rot-orig-ccw" title="Rotate original 90&deg; CCW" disabled>↺</button>
        <button class="rot-btn" id="btn-rot-orig-cw"  title="Rotate original 90&deg; CW"  disabled>↻</button>
      </div>
    </div>
    <div class="panel-img-wrap">
      <img id="orig-img" src="" alt="Original image" />
    </div>
  </div>
  <div class="panel" id="render-panel">
    <div class="panel-label render-label">
      AI Render
      <div class="rotate-btns">
        <button class="rot-btn" id="btn-rot-render-ccw" title="Rotate render 90&deg; CCW" disabled>↺</button>
        <button class="rot-btn" id="btn-rot-render-cw"  title="Rotate render 90&deg; CW"  disabled>↻</button>
      </div>
    </div>
    <div class="panel-img-wrap">
      <img id="render-img" src="" alt="AI render" />
      <div id="render-spinner"></div>
      <div id="render-missing-msg">
        <div class="icon">⚠</div>
        <p>Render file not on disk.<br>Click Re-render to regenerate.</p>
      </div>
    </div>
    <div id="filmstrip"></div>
  </div>
</div>

<div id="prompt-section">
  <span id="prompt-label">Prompt</span>
  <div id="prompt-right">
    <textarea id="prompt-textarea"></textarea>
    <div id="prompt-actions">
      <div id="source-toggle">
        <button class="src-btn" id="btn-src-orig">From original</button>
        <button class="src-btn active" id="btn-src-render">From current render</button>
      </div>
      <button id="btn-rerender">↺ Re-render</button>
      <div id="model-toggle">
        <button class="model-btn active" id="btn-model-gemini">Gemini</button>
        <button class="model-btn" id="btn-model-openai">GPT Image 1</button>
      </div>
      <a id="surgical-link" href="/view/admin/pages.html" target="_blank">Surgical Edit ↗</a>
    </div>
    <div id="ref-row">
      <span id="ref-row-label">Reference</span>
      <div id="ref-zone">
        <input type="file" id="ref-input" accept="image/*" style="display:none">
        <label for="ref-input" id="ref-empty-label"><span>＋ Add style reference image</span></label>
        <div id="ref-loaded">
          <img id="ref-thumb" src="" alt="reference">
          <span id="ref-loaded-name"></span>
          <button id="ref-clear-btn" type="button" title="Remove reference image">✕</button>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="footer">
  <div id="footer-left">
    <button class="btn" id="btn-back" disabled>← Back</button>
    <button class="btn" id="btn-skip">Skip →</button>
    <button class="btn" id="btn-filter">⚠ Re-render Only</button>
  </div>
  <span id="action-status"></span>
  <button class="btn" id="btn-set">✓ Set It</button>
</div>

<div id="done-screen">
  <h2>All Done ✓</h2>
  <p id="done-summary"></p>
</div>

<script>
const TOKEN = 'ea501a45abb967a5fde5feaa14361a230d0eed48bd76a6284d868ab7737e4365';

// ── State ─────────────────────────────────────────────────────────────────────
let CARDS      = [];
let idx        = 0;
let setCount   = 0;
let skipCount  = 0;
let filterOn   = false; // true = skip cards that don't need re-render
let sourceMode = 'render'; // 'base' | 'render'
let history    = [];       // [{idx, snapshots: [{...}]}]
let filmVersions   = []; // all _ai_N filenames on disk for current card
let filmActiveLive = ''; // active_version from server (what's live right now)
let refImageB64    = ''; // base64 data URL of uploaded reference image (or '')
let renderModel    = 'gemini'; // 'gemini' | 'openai'
let autoRenderAC   = null;    // AbortController for current card's auto-renders

// ── Elements ─────────────────────────────────────────────────────────────────
const loadingScreen  = document.getElementById('loading-screen');
const progressFill   = document.getElementById('progress-fill');
const header         = document.getElementById('header');
const counter        = document.getElementById('counter');
const cardLabel      = document.getElementById('card-label');
const pageLink       = document.getElementById('page-link');
const statusBar      = document.getElementById('status-bar');
const cardBadge      = document.getElementById('card-badge');
const noteText       = document.getElementById('note-text');
const viewer         = document.getElementById('viewer');
const origImg        = document.getElementById('orig-img');
const renderImg      = document.getElementById('render-img');
const renderSpinner  = document.getElementById('render-spinner');
const renderMissing  = document.getElementById('render-missing-msg');
const promptSection  = document.getElementById('prompt-section');
const promptTA       = document.getElementById('prompt-textarea');
const btnSrcOrig     = document.getElementById('btn-src-orig');
const btnSrcRender   = document.getElementById('btn-src-render');
const btnRerender    = document.getElementById('btn-rerender');
const surgicalLink   = document.getElementById('surgical-link');
const footer         = document.getElementById('footer');
const btnBack        = document.getElementById('btn-back');
const btnSkip        = document.getElementById('btn-skip');
const btnFilter      = document.getElementById('btn-filter');
const btnSet         = document.getElementById('btn-set');
const actionStatus   = document.getElementById('action-status');
const doneScreen     = document.getElementById('done-screen');
const doneSummary    = document.getElementById('done-summary');
const filmstrip      = document.getElementById('filmstrip');
const btnModelGemini = document.getElementById('btn-model-gemini');
const btnModelOpenAI = document.getElementById('btn-model-openai');
const refInput       = document.getElementById('ref-input');
const refEmptyLabel  = document.getElementById('ref-empty-label');
const refLoaded      = document.getElementById('ref-loaded');
const refThumb       = document.getElementById('ref-thumb');
const refLoadedName  = document.getElementById('ref-loaded-name');
const refClearBtn    = document.getElementById('ref-clear-btn');
const btnRotOrigCCW    = document.getElementById('btn-rot-orig-ccw');
const btnRotOrigCW     = document.getElementById('btn-rot-orig-cw');
const btnRotRenderCCW  = document.getElementById('btn-rot-render-ccw');
const btnRotRenderCW   = document.getElementById('btn-rot-render-cw');

// ── Init: load queue from server ──────────────────────────────────────────────
async function init() {
  try {
    const r = await fetch('/admin/api/renders/review-queue', {
      headers: { 'X-Admin-Token': TOKEN }
    });
    const d = await r.json();
    if (!d.ok) throw new Error(d.error || 'Failed to load queue');
    CARDS = d.queue;
    loadingScreen.style.display = 'none';
    [header, statusBar, viewer, promptSection, footer].forEach(el => el.style.display = '');
    // Fix flex display for elements that need it
    viewer.style.display = 'flex';
    promptSection.style.display = 'flex';
    footer.style.display = 'flex';
    statusBar.style.display = 'flex';
    header.style.display = 'flex';
    // Label filter button with count of cards needing re-render
    const needCount = CARDS.filter(c => !c.render_exists).length;
    btnFilter.textContent = `⚠ Re-render Only (${needCount})`;
    renderCard(0);
  } catch(e) {
    loadingScreen.querySelector('p').textContent = 'Error loading queue: ' + e.message;
    loadingScreen.querySelector('p').style.color = '#f87171';
  }
}

// ── Render a card ─────────────────────────────────────────────────────────────
function renderCard(i) {
  if (i >= CARDS.length) { showDone(); return; }
  const c = CARDS[i];
  idx = i;
  const total = CARDS.length;

  progressFill.style.width = ((i / total) * 100) + '%';
  counter.textContent = `${i + 1} / ${total}`;
  cardLabel.textContent = c.label;
  pageLink.href = c.page_url;

  // Status badge
  noteText.textContent = c.note ? ('⚠ ' + c.note) : '';
  if (c.is_approved) {
    cardBadge.textContent = '✓ Approved';
    cardBadge.className = 'card-badge badge-approved';
  } else if (c.is_active) {
    cardBadge.textContent = '◉ Currently Live';
    cardBadge.className = 'card-badge badge-active';
  } else if (!c.render_exists) {
    cardBadge.textContent = '⚠ Re-render Required';
    cardBadge.className = 'card-badge badge-rerender';
  } else {
    cardBadge.textContent = '✦ Render Restored';
    cardBadge.className = 'card-badge badge-restored';
  }

  // Images
  const origUrl = `/assets/images-opt/${c.base_file.replace('.webp', '_1920w.webp')}`;
  origImg.src = origUrl;

  if (c.render_exists) {
    const renderUrl = `/assets/images-opt/${c.render_file.replace('.webp', '_1920w.webp')}`;
    renderImg.src = renderUrl;
    renderImg.style.opacity = '1';
    renderImg.style.display = '';
    renderMissing.style.display = 'none';
  } else {
    renderImg.src = '';
    renderImg.style.display = 'none';
    renderMissing.style.display = 'flex';
  }
  renderSpinner.style.display = 'none';

  // Prompt
  promptTA.value = c.prompt || '';

  // Set It and render-rotate buttons disabled if render missing
  btnSet.disabled = !c.render_exists;
  btnRotRenderCCW.disabled = !c.render_exists;
  btnRotRenderCW.disabled  = !c.render_exists;

  // Surgical edit link
  surgicalLink.href = '/view/admin/pages.html';

  // Back button
  btnBack.disabled = history.length === 0;

  // Clear status
  actionStatus.className = '';
  actionStatus.textContent = '';
  actionStatus.style.display = 'none';

  setControlsEnabled(true);

  // Cancel any running auto-renders from the previous card
  if (autoRenderAC) { autoRenderAC.abort(); autoRenderAC = null; }

  // Load filmstrip async — also triggers auto-render if no renders exist
  loadFilmstrip(i);
}

function setControlsEnabled(on) {
  btnSet.disabled         = !on || !CARDS[idx]?.render_exists;
  btnSkip.disabled        = !on;
  btnRerender.disabled    = !on;
  btnSrcOrig.disabled     = !on;
  btnSrcRender.disabled   = !on;
  btnModelGemini.disabled = !on;
  btnModelOpenAI.disabled = !on;
  btnBack.disabled        = !on || history.length === 0;
  btnRotOrigCCW.disabled    = !on;
  btnRotOrigCW.disabled     = !on;
  btnRotRenderCCW.disabled  = !on || !CARDS[idx]?.render_exists;
  btnRotRenderCW.disabled   = !on || !CARDS[idx]?.render_exists;
  if (on) {
    renderSpinner.style.display = 'none';
    renderImg.style.opacity = '1';
  }
}

function showActionStatus(ok, msg) {
  actionStatus.className = ok ? 'ok' : 'err';
  actionStatus.textContent = msg;
  if (ok) setTimeout(() => {
    actionStatus.className = '';
    actionStatus.textContent = '';
    actionStatus.style.display = 'none';
  }, 2200);
}

// ── Rotate helpers ────────────────────────────────────────────────────────────
async function rotateImage(filename, degrees) {
  try {
    const r = await fetch('/admin/api/images/rotate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-Admin-Token': TOKEN },
      body: JSON.stringify({ filename, degrees })
    });
    const result = await r.json();
    if (!result.ok) throw new Error(result.error || 'Rotate failed');
    return true;
  } catch(e) {
    showActionStatus(false, '✗ ' + e.message);
    return false;
  }
}

function allRotBtns() { return [btnRotOrigCCW, btnRotOrigCW, btnRotRenderCCW, btnRotRenderCW]; }

async function handleRotateOrig(degrees) {
  const c = CARDS[idx];
  if (!c) return;
  allRotBtns().forEach(b => b.disabled = true);
  const ok = await rotateImage(c.base_file, degrees);
  if (ok) {
    origImg.src = `/assets/images-opt/${c.base_file.replace('.webp', '_1920w.webp')}?t=${Date.now()}`;
    showActionStatus(true, (degrees < 0 ? '↺' : '↻') + ' Original rotated — re-render to update AI result');
  }
  setControlsEnabled(true);
}

async function handleRotateRender(degrees) {
  const c = CARDS[idx];
  if (!c || !filmVersions.length) return;
  const cur = filmVersions.find(v => v.filename === c.render_file) || filmVersions[filmVersions.length - 1];
  if (!cur) return;
  allRotBtns().forEach(b => b.disabled = true);
  const ok = await rotateImage(cur.filename, degrees);
  if (ok) {
    const stem = cur.filename.replace('.webp', '');
    const ts = Date.now();
    renderImg.src = `/assets/images-opt/${stem}_1920w.webp?t=${ts}`;
    // Update filmstrip thumb cache-buster for this version
    cur.thumb_path = `/assets/images-opt/${stem}_201w.webp?t=${ts}`;
    buildFilmstrip(c);
    showActionStatus(true, (degrees < 0 ? '↺' : '↻') + ' Render rotated');
  }
  setControlsEnabled(true);
}

btnRotOrigCCW.addEventListener('click',   () => handleRotateOrig(-90));
btnRotOrigCW.addEventListener('click',    () => handleRotateOrig(90));
btnRotRenderCCW.addEventListener('click', () => handleRotateRender(-90));
btnRotRenderCW.addEventListener('click',  () => handleRotateRender(90));

// ── API helpers ───────────────────────────────────────────────────────────────
async function apiPut(slug, cardId, imageFile, pos, zoom) {
  const r = await fetch(`/admin/api/cards/${encodeURIComponent(slug)}/${encodeURIComponent(cardId)}`, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json', 'X-Admin-Token': TOKEN },
    body: JSON.stringify({ mode: 'image', image: `/assets/images-opt/${imageFile}`, position: pos, zoom })
  });
  if (!r.ok) { const j = await r.json().catch(() => ({})); throw new Error(j.error || r.status); }
  return r.json();
}

async function apiSetVersion(baseFile, versionFile) {
  const r = await fetch('/admin/api/images/set-version', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'X-Admin-Token': TOKEN },
    body: JSON.stringify({ base_filename: baseFile, version_filename: versionFile })
  });
  if (!r.ok) { const j = await r.json().catch(() => ({})); throw new Error(j.error || r.status); }
  return r.json();
}

async function apiPublish(slugs) {
  if (!slugs || !slugs.length) return;
  const r = await fetch('/admin/api/pages/publish', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'X-Admin-Token': TOKEN },
    body: JSON.stringify({ slugs })
  });
  if (!r.ok) { const j = await r.json().catch(() => ({})); throw new Error('publish: ' + (j.error || r.status)); }
  return r.json();
}

async function apiRerender(sourceFile, baseFile, prompt) {
  const body = { filename: sourceFile, base_filename: baseFile, prompt, mode: 'new', render_model: renderModel };
  if (refImageB64) body.reference_image_b64 = refImageB64;
  const r = await fetch('/admin/api/images/rerender', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'X-Admin-Token': TOKEN },
    body: JSON.stringify(body)
  });
  if (!r.ok) { const j = await r.json().catch(() => ({})); throw new Error(j.error || r.status); }
  return r.json();
}

// ── Snapshot helpers (for Back button) ───────────────────────────────────────
async function captureSnapshot(card) {
  const snaps = [];
  for (const a of card.actions) {
    if (a.type === 'card') {
      try {
        const r = await fetch(`/admin/api/cards/${encodeURIComponent(a.slug)}`, {
          headers: { 'X-Admin-Token': TOKEN }
        });
        const rows = await r.json();
        const found = Array.isArray(rows) ? rows.find(c => c.card_id === a.cardId) : null;
        snaps.push({
          type: 'card', slug: a.slug, cardId: a.cardId,
          prevImage:    found?.image    || `/assets/images-opt/${card.base_file}`,
          prevPosition: found?.position || '50% 50%',
          prevZoom:     found?.zoom     || 1,
        });
      } catch(e) {
        // Can't snapshot — use base file as safe fallback
        snaps.push({
          type: 'card', slug: a.slug, cardId: a.cardId,
          prevImage: `/assets/images-opt/${card.base_file}`,
          prevPosition: '50% 50%', prevZoom: 1,
        });
      }
    } else if (a.type === 'version') {
      try {
        const r = await fetch(`/admin/api/images/versions/${encodeURIComponent(card.base_file)}`, {
          headers: { 'X-Admin-Token': TOKEN }
        });
        const d = await r.json();
        snaps.push({ type: 'version', baseFile: card.base_file, prevVersion: d.active_version || '' });
      } catch(e) {
        snaps.push({ type: 'version', baseFile: card.base_file, prevVersion: '' });
      }
    }
  }
  return snaps;
}

async function restoreSnapshot(snaps) {
  for (const s of snaps) {
    if (s.type === 'card') {
      const imgFile = s.prevImage.split('/').pop();
      await apiPut(s.slug, s.cardId, imgFile, s.prevPosition, s.prevZoom);
    } else if (s.type === 'version') {
      await apiSetVersion(s.baseFile, s.prevVersion || '');
    }
  }
}

// ── Set It ────────────────────────────────────────────────────────────────────
async function doSet() {
  const c = CARDS[idx];
  setControlsEnabled(false);
  actionStatus.style.display = 'none';

  // Capture current state BEFORE overwriting (enables Back)
  let snaps;
  try { snaps = await captureSnapshot(c); }
  catch(e) { snaps = []; }

  try {
    for (const a of c.actions) {
      if (a.type === 'card') {
        await apiPut(a.slug, a.cardId, c.render_file, a.pos, a.zoom);
      } else if (a.type === 'version') {
        await apiSetVersion(c.base_file, c.render_file);
      }
    }
    if (c.publish && c.publish.length) await apiPublish(c.publish);

    // Mark approved in local state and push to history
    c.is_approved = true;
    c.is_active   = true;
    history.push({ idx, snaps, prevApproved: false });
    setCount++;

    showActionStatus(true, '✓ Set & published!');
    setTimeout(() => renderCard(idx + 1), 900);
  } catch(e) {
    showActionStatus(false, '✗ ' + e.message);
    setControlsEnabled(true);
  }
}

// ── Back (undo last Set) ──────────────────────────────────────────────────────
async function doBack() {
  if (!history.length) return;
  setControlsEnabled(false);
  const entry = history[history.length - 1];
  try {
    await restoreSnapshot(entry.snaps);
    history.pop();
    // Revert local card state
    const prevCard = CARDS[entry.idx];
    if (prevCard) { prevCard.is_approved = entry.prevApproved; }
    setCount = Math.max(0, setCount - 1);
    renderCard(entry.idx);
  } catch(e) {
    showActionStatus(false, '✗ Undo failed: ' + e.message);
    setControlsEnabled(true);
  }
}

// ── Re-render ─────────────────────────────────────────────────────────────────
async function doRerender() {
  const c = CARDS[idx];
  const newPrompt = promptTA.value.trim();
  if (!newPrompt) return;
  setControlsEnabled(false);
  renderImg.style.opacity = '0.15';
  renderImg.style.display = '';
  renderMissing.style.display = 'none';
  renderSpinner.style.display = 'block';
  actionStatus.className = '';
  actionStatus.textContent = '';
  actionStatus.style.display = 'none';
  try {
    const sourceFile = (!c.render_exists || sourceMode === 'base') ? c.base_file : c.render_file;
    const result = await apiRerender(sourceFile, c.base_file, newPrompt);
    if (!result.ok || !result.filename) throw new Error(result.error || 'No filename returned');
    // Update card data
    c.render_file   = result.filename;
    c.render_exists = true;
    c.prompt        = newPrompt;
    // Refresh right panel
    renderImg.onload = () => { renderImg.style.opacity = '1'; renderSpinner.style.display = 'none'; };
    renderImg.src = `/assets/images-opt/${result.filename.replace('.webp', '_1920w.webp')}?t=${Date.now()}`;
    btnSet.disabled = false;
    // Append to filmstrip (or add if not already there) and auto-select
    if (!filmVersions.some(v => v.filename === result.filename)) {
      const base = result.filename.replace('.webp', '');
      filmVersions.push({
        filename:     result.filename,
        thumb_path:   `/assets/images-opt/${base}_201w.webp`,
        hero_path:    `/assets/images-opt/${base}_1920w.webp`,
        render_model: result.render_model || renderModel,
      });
    }
    buildFilmstrip(c);
    const modelLabel = (result.render_model || renderModel) === 'openai' ? 'GPT Image 1' : 'Gemini';
    showActionStatus(true, `✓ New render ready (${modelLabel})`);
    setControlsEnabled(true);
  } catch(e) {
    renderImg.style.opacity = '1';
    renderSpinner.style.display = 'none';
    if (!c.render_exists) { renderMissing.style.display = 'flex'; renderImg.style.display = 'none'; }
    showActionStatus(false, '✗ Re-render failed: ' + e.message);
    setControlsEnabled(true);
  }
}

// ── Reference image ───────────────────────────────────────────────────────────
function loadRefFile(file) {
  if (!file || !file.type.startsWith('image/')) return;
  const reader = new FileReader();
  reader.onload = e => {
    refImageB64 = e.target.result; // full data URL
    refThumb.src = refImageB64;
    refLoadedName.textContent = file.name;
    refEmptyLabel.style.display = 'none';
    refLoaded.style.display = 'flex';
  };
  reader.readAsDataURL(file);
}

function clearRefImage() {
  refImageB64 = '';
  refInput.value = '';
  refThumb.src = '';
  refLoadedName.textContent = '';
  refLoaded.style.display = 'none';
  refEmptyLabel.style.display = '';
}

refInput.addEventListener('change', () => {
  if (refInput.files[0]) loadRefFile(refInput.files[0]);
});
refClearBtn.addEventListener('click', clearRefImage);

// Drag-and-drop onto the ref label
refEmptyLabel.addEventListener('dragover', e => { e.preventDefault(); refEmptyLabel.classList.add('drag-over'); });
refEmptyLabel.addEventListener('dragleave', () => refEmptyLabel.classList.remove('drag-over'));
refEmptyLabel.addEventListener('drop', e => {
  e.preventDefault();
  refEmptyLabel.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file) loadRefFile(file);
});

// ── Filmstrip ─────────────────────────────────────────────────────────────────
// filmVersions: array of {filename, thumb_path, hero_path, render_model?} for AI versions only
async function loadFilmstrip(cardIdx) {
  const c = CARDS[cardIdx];
  filmstrip.innerHTML = '';
  filmVersions   = [];
  filmActiveLive = '';
  try {
    const r = await fetch(`/admin/api/images/versions/${encodeURIComponent(c.base_file)}`, {
      headers: { 'X-Admin-Token': TOKEN }
    });
    const d = await r.json();
    filmActiveLive = d.active_version || '';
    filmVersions = (d.versions || [])
      .filter(v => !v.is_original)
      .map(v => ({ filename: v.filename, thumb_path: v.thumb_path, hero_path: v.hero_path, render_model: v.render_model }));

    // Look-ahead may have pre-rendered something — update card state so panel shows it
    if (filmVersions.length > 0 && !c.render_exists && idx === cardIdx) {
      const latest = filmVersions[filmVersions.length - 1];
      c.render_file   = latest.filename;
      c.render_exists = true;
      renderImg.onload = null;
      renderImg.src = (latest.hero_path || `/assets/images-opt/${latest.filename.replace('.webp','_1920w.webp')}`) + '?t=' + Date.now();
      renderImg.style.display = '';
      renderMissing.style.display = 'none';
      btnSet.disabled = false;
      cardBadge.textContent = '';
      cardBadge.className = 'card-badge';
    }

    buildFilmstrip(c);

    // Auto-render both models if still no renders after checking disk
    if (!c.render_exists && idx === cardIdx && c.prompt) {
      autoRenderBoth(c, cardIdx);
    }
  } catch(e) {
    if (!c.render_exists && idx === cardIdx && c.prompt) {
      autoRenderBoth(c, cardIdx);
    }
  }
}

function buildFilmstrip(c) {
  filmstrip.innerHTML = '';
  if (!filmVersions.length) return;
  filmVersions.forEach((v, i) => {
    const isSelected = v.filename === c.render_file;
    const isLive     = v.filename === filmActiveLive;
    const thumb = document.createElement('div');
    thumb.className = 'fs-thumb' + (isSelected ? ' fs-selected' : '');
    thumb.dataset.fname = v.filename;

    const img = document.createElement('img');
    img.src = v.thumb_path || v.hero_path; // _201w preferred; fallback to _1920w
    img.alt = `v${i + 1}`;
    img.onerror = () => { img.src = v.hero_path; };
    thumb.appendChild(img);

    const lbl = document.createElement('div');
    lbl.className = 'fs-label';
    lbl.textContent = `v${i + 1}`;
    thumb.appendChild(lbl);

    if (isLive) {
      const liveBadge = document.createElement('div');
      liveBadge.className = 'fs-live-badge';
      liveBadge.textContent = 'LIVE';
      thumb.appendChild(liveBadge);
    }
    if (v.render_model) {
      const mBadge = document.createElement('span');
      mBadge.className = 'model-badge ' + (v.render_model === 'openai' ? 'model-badge-openai' : 'model-badge-gemini');
      mBadge.textContent = v.render_model === 'openai' ? 'GPT' : 'G';
      mBadge.style.cssText = 'position:absolute;top:2px;left:2px;pointer-events:none';
      thumb.appendChild(mBadge);
    }

    // Delete button — shown on hover, blocked if this version is live
    const delBtn = document.createElement('button');
    delBtn.type = 'button';
    delBtn.className = 'fs-del-btn';
    delBtn.title = isLive ? 'Set another version live first before deleting this one' : 'Delete this render';
    delBtn.textContent = '✕';
    if (isLive) { delBtn.disabled = true; delBtn.style.opacity = '0.35'; delBtn.style.cursor = 'not-allowed'; }
    delBtn.addEventListener('click', e => {
      e.stopPropagation();
      if (isLive) { showActionStatus(false, '✗ Cannot delete live version — set another first'); return; }
      deleteFilmVersion(c, v, thumb);
    });
    thumb.appendChild(delBtn);

    thumb.addEventListener('click', () => selectFilmVersion(c, v));
    filmstrip.appendChild(thumb);
  });
  // scroll the selected thumb into view
  const sel = filmstrip.querySelector('.fs-selected');
  if (sel) sel.scrollIntoView({ inline: 'nearest', behavior: 'smooth' });
}

function selectFilmVersion(c, v) {
  c.render_file   = v.filename;
  c.render_exists = true;
  // update highlight
  filmstrip.querySelectorAll('.fs-thumb').forEach(t => {
    t.classList.toggle('fs-selected', t.dataset.fname === v.filename);
  });
  // refresh right panel
  renderImg.onload = null;
  renderImg.src = (v.hero_path || `/assets/images-opt/${v.filename.replace('.webp', '_1920w.webp')}`) + `?t=${Date.now()}`;
  renderImg.style.opacity = '1';
  renderImg.style.display = '';
  renderMissing.style.display = 'none';
  btnSet.disabled = false;
}

// ── Delete a filmstrip version ────────────────────────────────────────────────
async function deleteFilmVersion(c, v, thumbEl) {
  thumbEl.style.opacity = '0.35';
  try {
    const r = await fetch('/admin/api/images/delete-version', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-Admin-Token': TOKEN },
      body: JSON.stringify({ filename: v.filename })
    });
    const result = await r.json();
    if (!result.ok) throw new Error(result.error || 'Delete failed');

    // Remove from filmVersions array
    const fi = filmVersions.findIndex(fv => fv.filename === v.filename);
    if (fi !== -1) filmVersions.splice(fi, 1);

    // If this was the previewed version, switch panel
    if (c.render_file === v.filename) {
      if (filmVersions.length > 0) {
        selectFilmVersion(c, filmVersions[filmVersions.length - 1]);
      } else {
        c.render_file   = '';
        c.render_exists = false;
        renderImg.src   = '';
        renderImg.style.display  = 'none';
        renderMissing.style.display = 'flex';
        btnSet.disabled = true;
      }
    }
    buildFilmstrip(c);
    showActionStatus(true, '✓ Render deleted');
  } catch(e) {
    thumbEl.style.opacity = '1';
    showActionStatus(false, '✗ ' + e.message);
  }
}

// ── Auto-render both models on arrival (cards with no renders) ────────────────
async function autoRenderBoth(c, cardIdx) {
  if (autoRenderAC) autoRenderAC.abort();
  autoRenderAC = new AbortController();
  const signal = autoRenderAC.signal;

  // Show two pending placeholder thumbs so Henry sees activity immediately
  ['Gemini…', 'GPT…'].forEach(lbl => {
    const ph = document.createElement('div');
    ph.className = 'fs-thumb fs-pending';
    ph.dataset.pending = '1';
    const sp = document.createElement('div');
    sp.className = 'fs-spin';
    ph.appendChild(sp);
    const ml = document.createElement('div');
    ml.className = 'fs-pending-model';
    ml.textContent = lbl;
    ph.appendChild(ml);
    filmstrip.appendChild(ph);
  });

  let firstDone = false;

  const renderOne = async (model) => {
    try {
      const body = { filename: c.base_file, base_filename: c.base_file, prompt: c.prompt, mode: 'new', render_model: model };
      const resp = await fetch('/admin/api/images/rerender', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-Admin-Token': TOKEN },
        body: JSON.stringify(body),
        signal,
      });
      if (signal.aborted || idx !== cardIdx) return;
      const result = await resp.json();
      if (signal.aborted || idx !== cardIdx || !result.ok || !result.filename) return;

      // Remove one pending placeholder
      const ph = filmstrip.querySelector('.fs-pending');
      if (ph) ph.remove();

      if (!filmVersions.some(fv => fv.filename === result.filename)) {
        const base = result.filename.replace('.webp', '');
        filmVersions.push({
          filename:     result.filename,
          thumb_path:   `/assets/images-opt/${base}_201w.webp`,
          hero_path:    `/assets/images-opt/${base}_1920w.webp`,
          render_model: model,
        });
      }

      // First result in: show it in the render panel
      if (!firstDone) {
        firstDone = true;
        c.render_file   = result.filename;
        c.render_exists = true;
        renderImg.onload = () => { renderImg.style.opacity = '1'; };
        renderImg.src = `/assets/images-opt/${result.filename.replace('.webp','_1920w.webp')}?t=${Date.now()}`;
        renderImg.style.display  = '';
        renderMissing.style.display = 'none';
        btnSet.disabled = false;
        cardBadge.textContent = '';
        cardBadge.className = 'card-badge';
      }
      buildFilmstrip(c);
    } catch(e) {
      if (e.name === 'AbortError') return;
      const ph = filmstrip.querySelector('.fs-pending');
      if (ph) ph.remove();
      buildFilmstrip(c);
    }
  };

  await Promise.allSettled([renderOne('gemini'), renderOne('openai')]);

  // Look-ahead: silently pre-render both models for the next card
  if (!signal.aborted && idx === cardIdx) {
    const next = CARDS[cardIdx + 1];
    if (next && !next.render_exists && next.prompt) preRenderNext(next);
  }
}

// ── Silent look-ahead pre-render (no UI, updates card state for instant display) ──
async function preRenderNext(c) {
  for (const model of ['gemini', 'openai']) {
    if (c.render_exists) break; // one success is enough to skip the rest
    try {
      const body = { filename: c.base_file, base_filename: c.base_file, prompt: c.prompt, mode: 'new', render_model: model };
      const resp = await fetch('/admin/api/images/rerender', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-Admin-Token': TOKEN },
        body: JSON.stringify(body),
      });
      const result = await resp.json();
      if (result.ok && result.filename) {
        c.render_file   = result.filename;
        c.render_exists = true; // loadFilmstrip will pick this up when Henry navigates there
      }
    } catch(e) { /* silent — best-effort */ }
  }
}

// ── Done screen ───────────────────────────────────────────────────────────────
function showDone() {
  progressFill.style.width = '100%';
  [header, statusBar, viewer, promptSection, footer].forEach(el => el.style.display = 'none');
  doneScreen.style.display = 'flex';
  doneSummary.textContent = `${setCount} render${setCount !== 1 ? 's' : ''} activated · ${skipCount} skipped`;
}

// ── Event listeners ───────────────────────────────────────────────────────────
btnSet.addEventListener('click', doSet);
btnBack.addEventListener('click', doBack);
btnRerender.addEventListener('click', doRerender);
btnSkip.addEventListener('click', () => {
  skipCount++;
  if (filterOn) {
    const next = CARDS.findIndex((c, j) => j > idx && !c.render_exists);
    renderCard(next >= 0 ? next : CARDS.length);
  } else {
    renderCard(idx + 1);
  }
});
btnFilter.addEventListener('click', () => {
  filterOn = !filterOn;
  btnFilter.classList.toggle('filter-on', filterOn);
  if (filterOn) {
    const first = CARDS.findIndex(c => !c.render_exists);
    renderCard(first >= 0 ? first : CARDS.length);
  } else {
    renderCard(idx);
  }
});

btnSrcOrig.addEventListener('click', () => {
  sourceMode = 'base';
  btnSrcOrig.classList.add('active');
  btnSrcRender.classList.remove('active');
});
btnSrcRender.addEventListener('click', () => {
  sourceMode = 'render';
  btnSrcRender.classList.add('active');
  btnSrcOrig.classList.remove('active');
});

btnModelGemini.addEventListener('click', () => {
  renderModel = 'gemini';
  btnModelGemini.classList.add('active');
  btnModelOpenAI.classList.remove('active');
});
btnModelOpenAI.addEventListener('click', () => {
  renderModel = 'openai';
  btnModelOpenAI.classList.add('active');
  btnModelGemini.classList.remove('active');
});

document.addEventListener('keydown', e => {
  if (e.target === promptTA) return;
  if (e.key === 'Enter' || e.key === 'y') btnSet.click();
  if (e.key === 'ArrowRight' || e.key === 'n') btnSkip.click();
  if (e.key === 'Backspace' && e.metaKey) doBack();
});

// ── Start ─────────────────────────────────────────────────────────────────────
init();
