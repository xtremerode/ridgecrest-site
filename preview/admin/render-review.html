<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Render Review — Ridgecrest</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:#0d1a22;color:#e8eef2;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;display:flex;flex-direction:column;overflow:hidden}
#progress-bar{height:4px;background:#1e3040;position:fixed;top:0;left:0;right:0;z-index:100}
#progress-fill{height:100%;background:#3b82f6;transition:width .4s ease}

/* Loading */
#loading-screen{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;color:#6b8fa6}
#loading-screen .spinner{width:36px;height:36px;border:3px solid #1e3040;border-top-color:#3b82f6;border-radius:50%;animation:spin .65s linear infinite}
#loading-screen p{font-size:14px}

/* Header */
#header{padding:14px 20px 10px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #1e3040;flex-shrink:0;display:none}
#counter{font-size:12px;color:#6b8fa6;font-weight:700;letter-spacing:.06em;text-transform:uppercase;white-space:nowrap}
#card-label{font-size:18px;font-weight:700;color:#e8eef2;flex:1;text-align:center;padding:0 16px}
#page-link{font-size:12px;color:#3b82f6;text-decoration:none;white-space:nowrap}
#page-link:hover{color:#60a5fa}

/* Status bar */
#status-bar{padding:5px 20px;border-bottom:1px solid #1e3040;flex-shrink:0;display:none;align-items:center;gap:10px;min-height:30px}
.card-badge{font-size:11px;font-weight:700;letter-spacing:.06em;padding:3px 9px;border-radius:4px}
.badge-active{background:#0c2b42;color:#38bdf8;border:1px solid #0e4c6e}
.badge-approved{background:#052e16;color:#22c55e;border:1px solid #166534}
.badge-missing{background:#2a1800;color:#f59e0b;border:1px solid #78350f}
#note-text{font-size:11px;color:#d97706}

/* Two-panel viewer */
#viewer{flex:1;display:flex;min-height:0;display:none}
.panel{flex:1;display:flex;flex-direction:column;min-width:0}
#orig-panel{border-right:1px solid #1e3040}
.panel-label{padding:6px 0;font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#6b8fa6;background:#091520;border-bottom:1px solid #1e3040;flex-shrink:0;text-align:center}
.render-label{color:#3b82f6}
.panel-img-wrap{flex:1;display:flex;align-items:center;justify-content:center;overflow:hidden;background:#091520;position:relative}
.panel-img-wrap img{max-width:100%;max-height:100%;object-fit:contain;transition:opacity .2s}
#render-spinner{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:40px;height:40px;border:3px solid #1e3040;border-top-color:#3b82f6;border-radius:50%;animation:spin .65s linear infinite;display:none}
#render-missing-msg{position:absolute;top:0;left:0;right:0;bottom:0;display:none;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:#f59e0b;background:#091520}
#render-missing-msg .icon{font-size:36px;opacity:.6}
#render-missing-msg p{font-size:13px;color:#6b8fa6;text-align:center;line-height:1.5;max-width:200px}
@keyframes spin{to{transform:rotate(360deg)}}

/* Prompt section */
#prompt-section{padding:11px 20px;border-top:1px solid #1e3040;display:none;align-items:flex-end;gap:10px;flex-shrink:0;background:#0d1a22}
#prompt-label{font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:#6b8fa6;white-space:nowrap;padding-bottom:32px}
#prompt-right{flex:1;display:flex;flex-direction:column;gap:7px}
#prompt-textarea{background:#091520;color:#e8eef2;border:1px solid #2a4050;border-radius:8px;padding:9px 12px;font-size:13px;font-family:inherit;line-height:1.5;outline:none;resize:vertical;min-height:52px;max-height:120px;width:100%}
#prompt-textarea:focus{border-color:#3b82f6}
#prompt-actions{display:flex;align-items:center;gap:10px}
#source-toggle{display:flex;border-radius:6px;overflow:hidden;border:1px solid #2a4050;flex-shrink:0}
.src-btn{background:#0a1520;color:#6b8fa6;border:none;padding:6px 13px;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;white-space:nowrap}
.src-btn.active{background:#1d4ed8;color:#fff}
.src-btn:hover:not(.active):not(:disabled){background:#152030;color:#94a3b8}
.src-btn:disabled{opacity:.45;cursor:not-allowed}
#btn-rerender{background:#1e3040;color:#60a5fa;border:1px solid #1d4ed8;padding:9px 16px;border-radius:8px;cursor:pointer;font-size:14px;font-weight:700;white-space:nowrap;transition:all .15s;flex-shrink:0}
#btn-rerender:hover:not(:disabled){background:#1a3d6e;color:#93c5fd}
#btn-rerender:disabled{opacity:.45;cursor:not-allowed}
#surgical-link{font-size:12px;color:#6b8fa6;text-decoration:none;white-space:nowrap;margin-left:auto;padding:6px 0}
#surgical-link:hover{color:#94a3b8}

/* Footer */
#footer{padding:12px 20px;border-top:1px solid #1e3040;display:none;align-items:center;justify-content:space-between;flex-shrink:0}
.btn{padding:10px 24px;border-radius:8px;border:none;cursor:pointer;font-size:14px;font-weight:700;letter-spacing:.02em;transition:all .15s;white-space:nowrap}
.btn:disabled{opacity:.45;cursor:not-allowed}
#footer-left{display:flex;align-items:center;gap:8px}
#btn-back{background:#1e3040;color:#6b8fa6;border:1px solid #1e3040}
#btn-back:hover:not(:disabled){background:#243848;color:#94a3b8;border-color:#2a4050}
#btn-skip{background:#1e3040;color:#94a3b8}
#btn-skip:hover:not(:disabled){background:#243848;color:#e8eef2}
#btn-set{background:#166534;color:#bbf7d0;padding:10px 38px;font-size:15px}
#btn-set:hover:not(:disabled){background:#15803d;color:#dcfce7}
#action-status{padding:6px 12px;border-radius:6px;font-size:12px;font-weight:700;display:none}
#action-status.ok{background:#052e16;color:#22c55e;border:1px solid #166534;display:inline-block}
#action-status.err{background:#2d0707;color:#f87171;border:1px solid #7f1d1d;display:inline-block}

/* Filmstrip */
#filmstrip{height:84px;overflow-x:auto;overflow-y:hidden;display:flex;gap:6px;padding:6px 10px;background:#061018;border-top:1px solid #1e3040;flex-shrink:0;align-items:center;min-width:0;scrollbar-width:thin;scrollbar-color:#1e3040 #061018}
#filmstrip:empty{display:none}
.fs-thumb{flex-shrink:0;width:76px;height:64px;border-radius:5px;border:2px solid #1e3040;cursor:pointer;overflow:hidden;position:relative;background:#091520;transition:border-color .15s}
.fs-thumb img{width:100%;height:100%;object-fit:cover;display:block}
.fs-thumb.fs-selected{border-color:#3b82f6;box-shadow:0 0 0 1px #3b82f6}
.fs-thumb:hover:not(.fs-selected){border-color:#2a4050}
.fs-label{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.7);color:#94a3b8;font-size:10px;font-weight:700;text-align:center;padding:2px 0;pointer-events:none;letter-spacing:.04em}
.fs-live-badge{position:absolute;top:2px;right:2px;background:#0ea5e9;color:#fff;font-size:9px;font-weight:800;padding:1px 4px;border-radius:3px;letter-spacing:.04em;pointer-events:none;line-height:1.3}

/* Done screen */
#done-screen{display:none;flex:1;flex-direction:column;align-items:center;justify-content:center;gap:16px}
#done-screen h2{font-size:32px;font-weight:800;color:#22c55e}
#done-screen p{color:#6b8fa6;font-size:16px}
</style>
</head>
<body>

<div id="progress-bar"><div id="progress-fill"></div></div>

<div id="loading-screen">
  <div class="spinner"></div>
  <p>Loading render queue…</p>
</div>

<div id="header">
  <span id="counter"></span>
  <span id="card-label"></span>
  <a id="page-link" href="#" target="_blank">View live page ↗</a>
</div>
<div id="status-bar">
  <span id="card-badge"></span>
  <span id="note-text"></span>
</div>

<div id="viewer">
  <div class="panel" id="orig-panel">
    <div class="panel-label">Original</div>
    <div class="panel-img-wrap">
      <img id="orig-img" src="" alt="Original image" />
    </div>
  </div>
  <div class="panel" id="render-panel">
    <div class="panel-label render-label">AI Render</div>
    <div class="panel-img-wrap">
      <img id="render-img" src="" alt="AI render" />
      <div id="render-spinner"></div>
      <div id="render-missing-msg">
        <div class="icon">⚠</div>
        <p>Render file not on disk.<br>Click Re-render to regenerate.</p>
      </div>
    </div>
    <div id="filmstrip"></div>
  </div>
</div>

<div id="prompt-section">
  <span id="prompt-label">Prompt</span>
  <div id="prompt-right">
    <textarea id="prompt-textarea"></textarea>
    <div id="prompt-actions">
      <div id="source-toggle">
        <button class="src-btn" id="btn-src-orig">From original</button>
        <button class="src-btn active" id="btn-src-render">From current render</button>
      </div>
      <button id="btn-rerender">↺ Re-render</button>
      <a id="surgical-link" href="/view/admin/pages.html" target="_blank">Surgical Edit ↗</a>
    </div>
  </div>
</div>

<div id="footer">
  <div id="footer-left">
    <button class="btn" id="btn-back" disabled>← Back</button>
    <button class="btn" id="btn-skip">Skip →</button>
  </div>
  <span id="action-status"></span>
  <button class="btn" id="btn-set">✓ Set It</button>
</div>

<div id="done-screen">
  <h2>All Done ✓</h2>
  <p id="done-summary"></p>
</div>

<script>
const TOKEN = 'ea501a45abb967a5fde5feaa14361a230d0eed48bd76a6284d868ab7737e4365';

// ── State ─────────────────────────────────────────────────────────────────────
let CARDS      = [];
let idx        = 0;
let setCount   = 0;
let skipCount  = 0;
let sourceMode = 'render'; // 'base' | 'render'
let history    = [];       // [{idx, snapshots: [{...}]}]
let filmVersions   = []; // all _ai_N filenames on disk for current card
let filmActiveLive = ''; // active_version from server (what's live right now)

// ── Elements ─────────────────────────────────────────────────────────────────
const loadingScreen  = document.getElementById('loading-screen');
const progressFill   = document.getElementById('progress-fill');
const header         = document.getElementById('header');
const counter        = document.getElementById('counter');
const cardLabel      = document.getElementById('card-label');
const pageLink       = document.getElementById('page-link');
const statusBar      = document.getElementById('status-bar');
const cardBadge      = document.getElementById('card-badge');
const noteText       = document.getElementById('note-text');
const viewer         = document.getElementById('viewer');
const origImg        = document.getElementById('orig-img');
const renderImg      = document.getElementById('render-img');
const renderSpinner  = document.getElementById('render-spinner');
const renderMissing  = document.getElementById('render-missing-msg');
const promptSection  = document.getElementById('prompt-section');
const promptTA       = document.getElementById('prompt-textarea');
const btnSrcOrig     = document.getElementById('btn-src-orig');
const btnSrcRender   = document.getElementById('btn-src-render');
const btnRerender    = document.getElementById('btn-rerender');
const surgicalLink   = document.getElementById('surgical-link');
const footer         = document.getElementById('footer');
const btnBack        = document.getElementById('btn-back');
const btnSkip        = document.getElementById('btn-skip');
const btnSet         = document.getElementById('btn-set');
const actionStatus   = document.getElementById('action-status');
const doneScreen     = document.getElementById('done-screen');
const doneSummary    = document.getElementById('done-summary');
const filmstrip      = document.getElementById('filmstrip');

// ── Init: load queue from server ──────────────────────────────────────────────
async function init() {
  try {
    const r = await fetch('/admin/api/renders/review-queue', {
      headers: { 'X-Admin-Token': TOKEN }
    });
    const d = await r.json();
    if (!d.ok) throw new Error(d.error || 'Failed to load queue');
    CARDS = d.queue;
    loadingScreen.style.display = 'none';
    [header, statusBar, viewer, promptSection, footer].forEach(el => el.style.display = '');
    // Fix flex display for elements that need it
    viewer.style.display = 'flex';
    promptSection.style.display = 'flex';
    footer.style.display = 'flex';
    statusBar.style.display = 'flex';
    header.style.display = 'flex';
    renderCard(0);
  } catch(e) {
    loadingScreen.querySelector('p').textContent = 'Error loading queue: ' + e.message;
    loadingScreen.querySelector('p').style.color = '#f87171';
  }
}

// ── Render a card ─────────────────────────────────────────────────────────────
function renderCard(i) {
  if (i >= CARDS.length) { showDone(); return; }
  const c = CARDS[i];
  idx = i;
  const total = CARDS.length;

  progressFill.style.width = ((i / total) * 100) + '%';
  counter.textContent = `${i + 1} / ${total}`;
  cardLabel.textContent = c.label;
  pageLink.href = c.page_url;

  // Status badge
  noteText.textContent = c.note ? ('⚠ ' + c.note) : '';
  if (c.is_approved) {
    cardBadge.textContent = '✓ Approved';
    cardBadge.className = 'card-badge badge-approved';
  } else if (c.is_active) {
    cardBadge.textContent = '◉ Currently Live';
    cardBadge.className = 'card-badge badge-active';
  } else if (!c.render_exists) {
    cardBadge.textContent = '⚠ Render Missing';
    cardBadge.className = 'card-badge badge-missing';
  } else {
    cardBadge.textContent = '';
    cardBadge.className = 'card-badge';
  }

  // Images
  const origUrl = `/assets/images-opt/${c.base_file.replace('.webp', '_1920w.webp')}`;
  origImg.src = origUrl;

  if (c.render_exists) {
    const renderUrl = `/assets/images-opt/${c.render_file.replace('.webp', '_1920w.webp')}`;
    renderImg.src = renderUrl;
    renderImg.style.opacity = '1';
    renderImg.style.display = '';
    renderMissing.style.display = 'none';
  } else {
    renderImg.src = '';
    renderImg.style.display = 'none';
    renderMissing.style.display = 'flex';
  }
  renderSpinner.style.display = 'none';

  // Prompt
  promptTA.value = c.prompt || '';

  // Set It disabled if render missing
  btnSet.disabled = !c.render_exists;

  // Surgical edit link
  surgicalLink.href = '/view/admin/pages.html';

  // Back button
  btnBack.disabled = history.length === 0;

  // Clear status
  actionStatus.className = '';
  actionStatus.textContent = '';
  actionStatus.style.display = 'none';

  setControlsEnabled(true);

  // Load filmstrip async (doesn't block card display)
  loadFilmstrip(i);
}

function setControlsEnabled(on) {
  btnSet.disabled      = !on || !CARDS[idx]?.render_exists;
  btnSkip.disabled     = !on;
  btnRerender.disabled = !on;
  btnSrcOrig.disabled  = !on;
  btnSrcRender.disabled = !on;
  btnBack.disabled     = !on || history.length === 0;
  if (on) {
    renderSpinner.style.display = 'none';
    renderImg.style.opacity = '1';
  }
}

function showActionStatus(ok, msg) {
  actionStatus.className = ok ? 'ok' : 'err';
  actionStatus.textContent = msg;
  if (ok) setTimeout(() => {
    actionStatus.className = '';
    actionStatus.textContent = '';
    actionStatus.style.display = 'none';
  }, 2200);
}

// ── API helpers ───────────────────────────────────────────────────────────────
async function apiPut(slug, cardId, imageFile, pos, zoom) {
  const r = await fetch(`/admin/api/cards/${encodeURIComponent(slug)}/${encodeURIComponent(cardId)}`, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json', 'X-Admin-Token': TOKEN },
    body: JSON.stringify({ mode: 'image', image: `/assets/images-opt/${imageFile}`, position: pos, zoom })
  });
  if (!r.ok) { const j = await r.json().catch(() => ({})); throw new Error(j.error || r.status); }
  return r.json();
}

async function apiSetVersion(baseFile, versionFile) {
  const r = await fetch('/admin/api/images/set-version', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'X-Admin-Token': TOKEN },
    body: JSON.stringify({ base_filename: baseFile, version_filename: versionFile })
  });
  if (!r.ok) { const j = await r.json().catch(() => ({})); throw new Error(j.error || r.status); }
  return r.json();
}

async function apiPublish(slugs) {
  if (!slugs || !slugs.length) return;
  const r = await fetch('/admin/api/pages/publish', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'X-Admin-Token': TOKEN },
    body: JSON.stringify({ slugs })
  });
  if (!r.ok) { const j = await r.json().catch(() => ({})); throw new Error('publish: ' + (j.error || r.status)); }
  return r.json();
}

async function apiRerender(sourceFile, baseFile, prompt) {
  const r = await fetch('/admin/api/images/rerender', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'X-Admin-Token': TOKEN },
    body: JSON.stringify({ filename: sourceFile, base_filename: baseFile, prompt, mode: 'new' })
  });
  if (!r.ok) { const j = await r.json().catch(() => ({})); throw new Error(j.error || r.status); }
  return r.json();
}

// ── Snapshot helpers (for Back button) ───────────────────────────────────────
async function captureSnapshot(card) {
  const snaps = [];
  for (const a of card.actions) {
    if (a.type === 'card') {
      try {
        const r = await fetch(`/admin/api/cards/${encodeURIComponent(a.slug)}`, {
          headers: { 'X-Admin-Token': TOKEN }
        });
        const rows = await r.json();
        const found = Array.isArray(rows) ? rows.find(c => c.card_id === a.cardId) : null;
        snaps.push({
          type: 'card', slug: a.slug, cardId: a.cardId,
          prevImage:    found?.image    || `/assets/images-opt/${card.base_file}`,
          prevPosition: found?.position || '50% 50%',
          prevZoom:     found?.zoom     || 1,
        });
      } catch(e) {
        // Can't snapshot — use base file as safe fallback
        snaps.push({
          type: 'card', slug: a.slug, cardId: a.cardId,
          prevImage: `/assets/images-opt/${card.base_file}`,
          prevPosition: '50% 50%', prevZoom: 1,
        });
      }
    } else if (a.type === 'version') {
      try {
        const r = await fetch(`/admin/api/images/versions/${encodeURIComponent(card.base_file)}`, {
          headers: { 'X-Admin-Token': TOKEN }
        });
        const d = await r.json();
        snaps.push({ type: 'version', baseFile: card.base_file, prevVersion: d.active_version || '' });
      } catch(e) {
        snaps.push({ type: 'version', baseFile: card.base_file, prevVersion: '' });
      }
    }
  }
  return snaps;
}

async function restoreSnapshot(snaps) {
  for (const s of snaps) {
    if (s.type === 'card') {
      const imgFile = s.prevImage.split('/').pop();
      await apiPut(s.slug, s.cardId, imgFile, s.prevPosition, s.prevZoom);
    } else if (s.type === 'version') {
      await apiSetVersion(s.baseFile, s.prevVersion || '');
    }
  }
}

// ── Set It ────────────────────────────────────────────────────────────────────
async function doSet() {
  const c = CARDS[idx];
  setControlsEnabled(false);
  actionStatus.style.display = 'none';

  // Capture current state BEFORE overwriting (enables Back)
  let snaps;
  try { snaps = await captureSnapshot(c); }
  catch(e) { snaps = []; }

  try {
    for (const a of c.actions) {
      if (a.type === 'card') {
        await apiPut(a.slug, a.cardId, c.render_file, a.pos, a.zoom);
      } else if (a.type === 'version') {
        await apiSetVersion(c.base_file, c.render_file);
      }
    }
    if (c.publish && c.publish.length) await apiPublish(c.publish);

    // Mark approved in local state and push to history
    c.is_approved = true;
    c.is_active   = true;
    history.push({ idx, snaps, prevApproved: false });
    setCount++;

    showActionStatus(true, '✓ Set & published!');
    setTimeout(() => renderCard(idx + 1), 900);
  } catch(e) {
    showActionStatus(false, '✗ ' + e.message);
    setControlsEnabled(true);
  }
}

// ── Back (undo last Set) ──────────────────────────────────────────────────────
async function doBack() {
  if (!history.length) return;
  setControlsEnabled(false);
  const entry = history[history.length - 1];
  try {
    await restoreSnapshot(entry.snaps);
    history.pop();
    // Revert local card state
    const prevCard = CARDS[entry.idx];
    if (prevCard) { prevCard.is_approved = entry.prevApproved; }
    setCount = Math.max(0, setCount - 1);
    renderCard(entry.idx);
  } catch(e) {
    showActionStatus(false, '✗ Undo failed: ' + e.message);
    setControlsEnabled(true);
  }
}

// ── Re-render ─────────────────────────────────────────────────────────────────
async function doRerender() {
  const c = CARDS[idx];
  const newPrompt = promptTA.value.trim();
  if (!newPrompt) return;
  setControlsEnabled(false);
  renderImg.style.opacity = '0.15';
  renderImg.style.display = '';
  renderMissing.style.display = 'none';
  renderSpinner.style.display = 'block';
  actionStatus.className = '';
  actionStatus.textContent = '';
  actionStatus.style.display = 'none';
  try {
    const sourceFile = (!c.render_exists || sourceMode === 'base') ? c.base_file : c.render_file;
    const result = await apiRerender(sourceFile, c.base_file, newPrompt);
    if (!result.ok || !result.filename) throw new Error(result.error || 'No filename returned');
    // Update card data
    c.render_file   = result.filename;
    c.render_exists = true;
    c.prompt        = newPrompt;
    // Refresh right panel
    renderImg.onload = () => { renderImg.style.opacity = '1'; renderSpinner.style.display = 'none'; };
    renderImg.src = `/assets/images-opt/${result.filename.replace('.webp', '_1920w.webp')}?t=${Date.now()}`;
    btnSet.disabled = false;
    // Append to filmstrip (or add if not already there) and auto-select
    if (!filmVersions.some(v => v.filename === result.filename)) {
      const base = result.filename.replace('.webp', '');
      filmVersions.push({
        filename:   result.filename,
        thumb_path: `/assets/images-opt/${base}_201w.webp`,
        hero_path:  `/assets/images-opt/${base}_1920w.webp`,
      });
    }
    buildFilmstrip(c);
    showActionStatus(true, '✓ New render ready');
    setControlsEnabled(true);
  } catch(e) {
    renderImg.style.opacity = '1';
    renderSpinner.style.display = 'none';
    if (!c.render_exists) { renderMissing.style.display = 'flex'; renderImg.style.display = 'none'; }
    showActionStatus(false, '✗ Re-render failed: ' + e.message);
    setControlsEnabled(true);
  }
}

// ── Filmstrip ─────────────────────────────────────────────────────────────────
// filmVersions: array of {filename, thumb_path, hero_path} for AI versions only
async function loadFilmstrip(cardIdx) {
  const c = CARDS[cardIdx];
  filmstrip.innerHTML = '';
  filmVersions   = [];
  filmActiveLive = '';
  try {
    const r = await fetch(`/admin/api/images/versions/${encodeURIComponent(c.base_file)}`, {
      headers: { 'X-Admin-Token': TOKEN }
    });
    const d = await r.json();
    filmActiveLive = d.active_version || '';
    // Keep only AI versions (exclude the original base image)
    filmVersions = (d.versions || [])
      .filter(v => !v.is_original)
      .map(v => ({ filename: v.filename, thumb_path: v.thumb_path, hero_path: v.hero_path }));
    buildFilmstrip(c);
  } catch(e) { /* filmstrip stays empty */ }
}

function buildFilmstrip(c) {
  filmstrip.innerHTML = '';
  if (!filmVersions.length) return;
  filmVersions.forEach((v, i) => {
    const isSelected = v.filename === c.render_file;
    const isLive     = v.filename === filmActiveLive;
    const thumb = document.createElement('div');
    thumb.className = 'fs-thumb' + (isSelected ? ' fs-selected' : '');
    thumb.dataset.fname = v.filename;

    const img = document.createElement('img');
    img.src = v.thumb_path || v.hero_path; // _201w preferred; fallback to _1920w
    img.alt = `v${i + 1}`;
    img.onerror = () => { img.src = v.hero_path; };
    thumb.appendChild(img);

    const lbl = document.createElement('div');
    lbl.className = 'fs-label';
    lbl.textContent = `v${i + 1}`;
    thumb.appendChild(lbl);

    if (isLive) {
      const badge = document.createElement('div');
      badge.className = 'fs-live-badge';
      badge.textContent = 'LIVE';
      thumb.appendChild(badge);
    }

    thumb.addEventListener('click', () => selectFilmVersion(c, v));
    filmstrip.appendChild(thumb);
  });
  // scroll the selected thumb into view
  const sel = filmstrip.querySelector('.fs-selected');
  if (sel) sel.scrollIntoView({ inline: 'nearest', behavior: 'smooth' });
}

function selectFilmVersion(c, v) {
  c.render_file   = v.filename;
  c.render_exists = true;
  // update highlight
  filmstrip.querySelectorAll('.fs-thumb').forEach(t => {
    t.classList.toggle('fs-selected', t.dataset.fname === v.filename);
  });
  // refresh right panel
  renderImg.onload = null;
  renderImg.src = (v.hero_path || `/assets/images-opt/${v.filename.replace('.webp', '_1920w.webp')}`) + `?t=${Date.now()}`;
  renderImg.style.opacity = '1';
  renderImg.style.display = '';
  renderMissing.style.display = 'none';
  btnSet.disabled = false;
}

// ── Done screen ───────────────────────────────────────────────────────────────
function showDone() {
  progressFill.style.width = '100%';
  [header, statusBar, viewer, promptSection, footer].forEach(el => el.style.display = 'none');
  doneScreen.style.display = 'flex';
  doneSummary.textContent = `${setCount} render${setCount !== 1 ? 's' : ''} activated · ${skipCount} skipped`;
}

// ── Event listeners ───────────────────────────────────────────────────────────
btnSet.addEventListener('click', doSet);
btnBack.addEventListener('click', doBack);
btnRerender.addEventListener('click', doRerender);
btnSkip.addEventListener('click', () => { skipCount++; renderCard(idx + 1); });

btnSrcOrig.addEventListener('click', () => {
  sourceMode = 'base';
  btnSrcOrig.classList.add('active');
  btnSrcRender.classList.remove('active');
});
btnSrcRender.addEventListener('click', () => {
  sourceMode = 'render';
  btnSrcRender.classList.add('active');
  btnSrcOrig.classList.remove('active');
});

document.addEventListener('keydown', e => {
  if (e.target === promptTA) return;
  if (e.key === 'Enter' || e.key === 'y') btnSet.click();
  if (e.key === 'ArrowRight' || e.key === 'n') btnSkip.click();
  if (e.key === 'Backspace' && e.metaKey) doBack();
});

// ── Start ─────────────────────────────────────────────────────────────────────
init();
</script>
