<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login — Ridgecrest Designs</title>
  <link rel="stylesheet" href="css/admin.css" />
</head>
<body class="login-page">

  <div class="login-card">
    <div class="login-logo">
      <div class="login-logo-mark">Ridgecrest Designs</div>
    </div>
    <h1 class="login-title">Admin Panel</h1>
    <p class="login-sub">Sign in to manage your website and campaigns</p>

    <div class="login-error" id="loginError">Incorrect password. Please try again.</div>

    <form id="loginForm">
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input class="form-input" type="password" id="password" placeholder="Enter admin password" autocomplete="current-password" autofocus />
      </div>
      <button type="submit" class="btn btn-primary" id="loginBtn">
        <span id="loginBtnText">Sign In</span>
      </button>
    </form>
  </div>

  <script src="js/admin.js"></script>
  <script>
    // Redirect if already logged in
    if (Admin.isLoggedIn()) {
      window.location.href = 'dashboard.html';
    }

    const form = document.getElementById('loginForm');
    const errorEl = document.getElementById('loginError');
    const pwInput = document.getElementById('password');
    const btnText = document.getElementById('loginBtnText');

    form.addEventListener('submit', async e => {
      e.preventDefault();
      errorEl.classList.remove('show');
      btnText.textContent = 'Signing in…';

      try {
        const res = await fetch('/admin/api/auth', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: pwInput.value })
        });
        const data = await res.json();

        if (data.token) {
          Admin.setToken(data.token);
          window.location.href = 'dashboard.html';
        } else {
          pwInput.classList.add('error');
          errorEl.classList.add('show');
          btnText.textContent = 'Sign In';
        }
      } catch (err) {
        pwInput.classList.add('error');
        errorEl.textContent = 'Server error. Make sure the preview server is running.';
        errorEl.classList.add('show');
        btnText.textContent = 'Sign In';
      }
    });

    pwInput.addEventListener('input', () => {
      pwInput.classList.remove('error');
      errorEl.classList.remove('show');
    });
  </script>
</body>
</html>
