    html, body {

    .sap-bg-overlay {

      z-index: 1;

    .sap-content {
      position: relative;
      z-index: 2;

      padding: 120px 24px 60px;
    }
    .sap-header {
      text-align: center;

    }
    .sap-eyebrow {

    }
    .sap-title {
      font-family: var(--font-display);
      font-size: clamp(1.8rem, 4vw, 2.8rem);

      line-height: 1.15;
      margin: 0;
    }
    .sap-title em { font-style: italic; }
    .sap-sub {
      font-family: var(--font-sans);
      font-size: 0.9rem;
      font-weight: 300;
      color: rgba(255,255,255,0.7);
      margin-top: 0.5rem;
    }

    /* Desktop: floating card */
    .sap-frame {
      width: 100%;
      max-width: 780px;
      background: rgba(255, 255, 255, 0.97);
      border-radius: 12px;
      box-shadow: 0 8px 60px rgba(0, 0, 0, 0.4);
      overflow: hidden;
      flex: none;
      transition: height 0.3s ease;
    }
    .sap-frame iframe {
      width: 100%;
      height: 600px;
      border: none;
      display: block;
      transition: height 0.3s ease;
    }

    /* Tablet + Mobile: full width, tall iframe, page scrolls */
    @media (max-width: 1024px) {
      .sap-content {
        padding: 80px 0 0;
      }
      .sap-header {
        padding: 0 16px;
      }
      .sap-frame {
        border-radius: 0;
        max-width: 100%;
        box-shadow: none;
        min-height: auto;
        flex: none;
      }
      .sap-frame iframe {
        height: 600px;
      }
    }

  <script>
    // Mobile nav toggle
    var navToggle = document.getElementById('navToggle');
    var navLinks = document.getElementById('navLinks');
    if (navToggle && navLinks) {
      navToggle.addEventListener('click', function() {
        navLinks.classList.toggle('nav__links--open');
      });
    }

    // Auto-resize iframe via postMessage from Elevate Scheduling
    (function() {
      var frame = document.querySelector('.sap-frame iframe');
      var wrapper = document.querySelector('.sap-frame');
      if (!frame || !wrapper) return;

      var PADDING = 40;
      var MIN_H   = 500;
      var currentH = 0;
      var locked   = false;
      var timer    = null;

      function setSize(h) {
        currentH = h;
        frame.style.height   = h + 'px';
        wrapper.style.height = h + 'px';
      }

      function accept(rawH) {
        var target = Math.max(rawH + PADDING, MIN_H);
        if (target === currentH) return;
        setSize(target);
        locked = true;
        clearTimeout(timer);
        timer = setTimeout(function() { locked = false; }, 500);
      }

      // When the user clicks inside the iframe, the parent window loses focus.
      // Instantly collapse the iframe to MIN_H (no CSS transition) so that
      // Tailwind's min-h-screen (100vh inside the iframe) resolves to MIN_H.
      // If the user navigated Back, the true content height is now smaller than
      // MIN_H's inflation cap, so Elevate's ResizeObserver fires with the real
      // height. We then accept that message and smoothly expand to the correct size.
      // For same-step clicks (e.g. form field focus), the content height exceeds
      // MIN_H so ResizeObserver fires with the same step height and we restore it.
      window.addEventListener('blur', function() {
        locked = false;
        clearTimeout(timer);

        // Disable CSS transition so the collapse is a snap (no downward animation)
        frame.style.transition = 'none';
        wrapper.style.transition = 'none';
        frame.style.height   = MIN_H + 'px';
        wrapper.style.height = MIN_H + 'px';
        currentH = MIN_H;

        // Re-enable transition after two rAFs so the subsequent expansion is animated
        requestAnimationFrame(function() {
          requestAnimationFrame(function() {
            frame.style.transition = '';
            wrapper.style.transition = '';
          });
        });
      });

      window.addEventListener('message', function(e) {
        if (!e.data || !e.data.type) return;

        // api-request-start fires on auth checks — use it as an unlock signal only
        if (e.data.type === 'api-request-start') {
          locked = false;
          return;
        }

        if (e.data.type !== 'elevate-resize') return;
        var h = e.data.height;
        if (typeof h !== 'number' || h < 50) return;
        if (locked) return;
        accept(h);
      });
    })();
  </script>
</body>
</html>
